<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLUS Voetbalplaatjes Tracker 2025-2026</title>
    <style>
        :root {
            --plus-groen: #00a651;
            --plus-wit: #ffffff;
            --plus-rood: #ed1c24;
            --plus-blauw: #0054a6;
            --plus-zwart: #333333;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: var(--plus-zwart);
            margin: 0;
            padding: 20px;
        }

        header {
            background-color: var(--plus-groen);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--plus-rood);
            margin-bottom: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .club-section {
            background: white;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .club-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--plus-groen);
            margin-bottom: 10px;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .compleet { background-color: var(--plus-groen); color: white; }
        .niet-compleet { background-color: #eee; color: #777; }

        .sticker-row {
            display: grid;
            grid-template-columns: 50px 1fr auto;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .radio-group label {
            margin-left: 5px;
            margin-right: 10px;
            font-size: 0.9em;
        }

        #overzicht {
            position: sticky;
            bottom: 0;
            background: var(--plus-zwart);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            margin-top: 20px;
        }

        .summary-box {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .summary-item { text-align: center; }
        .number { font-size: 1.5em; font-weight: bold; display: block; }
        
        .list-output {
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.8em;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Mijn Voetbalplaatjes 2025-2026</h1>
   </header>

<div class="container" id="app">
    </div>

<div id="overzicht">
    <div class="summary-box">
        <div class="summary-item">
            <span class="number" id="count-missend">0</span>
            Plaatjes mis
        </div>
        <div class="summary-item">
            <span class="number" id="count-dubbel">0</span>
            Dubbel
        </div>
        <div class="summary-item">
            <span class="number" id="count-compleet">0</span>
            Clubs compleet
        </div>
    </div>
    <div id="lijsten" class="list-output">
        <div><strong>Nog nodig:</strong> <span id="lijst-nodig">-</span></div>
        <div style="margin-top: 8px; color: #ffcc00;">
            <strong>Dubbel (ruilmateriaal):</strong> <span id="lijst-dubbel">-</span>
        </div>
    </div> <div style="background: #eee; padding: 10px; text-align: center; margin-bottom: 20px;">
    <button onclick="exporteerData()" style="padding: 10px; cursor: pointer;">💾 Opslaan (Bestand downloaden)</button>
    <button onclick="importeerData()" style="padding: 10px; cursor: pointer;">📂 Laden (Bestand openen)</button>

</div>

<script>

    const data = [

        { club: "AZ", start: 17, eind: 32 },
        { club: "Excelsior", start: 33, eind: 48 },
        { club: "FC Groningen", start: 49, eind: 64 },
        { club: "FC Twente", start: 65, eind: 80 },

        { club: "Feyenoord", start: 113, eind: 128 },
        { club: "Fortuna Sittard", start: 129, eind: 144 },
        { club: "Go Ahead Eagles", start: 145, eind: 160 },
        { club: "Heracles", start: 161, eind: 176 },
        { club: "NEC", start: 177, eind: 192 },
        { club: "NAC", start: 193, eind: 208 },
        { club: "PEC Zwolle", start: 209, eind: 224 },
        { club: "PSV", start: 225, eind: 240 },
        { club: "SC Heerenveen", start: 241, eind: 256 },
        { club: "Sparta", start: 257, eind: 272 },
        { club: "Telstar", start: 273, eind: 288 }
    ];


    // Status bijhouden: plaatjeNummer -> aantal (0,1,2,3)
    const status = JSON.parse(localStorage.getItem('voetbalStatus')) || {};

    function renderApp() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        data.forEach(item => {
            const section = document.createElement('div');
            section.className = 'club-section';
            
            let stickerHTML = '';
            let clubCompleet = true;

            for (let i = item.start; i <= item.eind; i++) {
                const aantal = status[i] || 0;
                if (aantal === 0) clubCompleet = false;

                stickerHTML += `
                    <div class="sticker-row">
                        <strong>#${i}</strong>
                        <span>Plaatje ${i}</span>
                        <div class="radio-group">
                            ${[0, 1, 2, 3].map(v => `
                                <input type="radio" name="p${i}" value="${v}" ${aantal == v ? 'checked' : ''} onchange="update(${i}, ${v})">
                                <label>${v}</label>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            section.innerHTML = `
                <div class="club-header">
                    <h2>${item.club}</h2>
                    <span class="status-badge ${clubCompleet ? 'compleet' : 'niet-compleet'}">
                        ${clubCompleet ? 'COMPLEET' : 'BEZIG'}
                    </span>
                </div>
                ${stickerHTML}
            `;
            app.appendChild(section);
        });
        updateStats();
    }

    window.update = (nr, waarde) => {
        status[nr] = waarde;
        localStorage.setItem('voetbalStatus', JSON.stringify(status));
        renderApp();
    };

    function updateStats() {
        let mis = [];
        let dubbelLijst = []; // Nieuwe lijst voor de nummers die je dubbel hebt
        let dubbelAantal = 0;
        let completeClubs = 0;

        // We lopen door alle 288 plaatjes heen
        for (let i = 1; i <= 288; i++) {
            const aantal = status[i] || 0;
            
            if (aantal === 0) {
                mis.push(i);
            }
            
            if (aantal >= 2) {
                // We voegen het nummer toe aan de lijst van dubbelen
                // We zetten erbij hoeveel je er extra hebt (bijv. "12 (2x)")
                const extra = aantal - 1;
                dubbelLijst.push(`${i} (${extra}x)`);
                dubbelAantal += extra;
            }
        }

        // Clubs controleren op compleetheid
        data.forEach(item => {
            let compleet = true;
            for (let i = item.start; i <= item.eind; i++) {
                if ((status[i] || 0) === 0) compleet = false;
            }
            if (compleet) completeClubs++;
        });

        // De resultaten op het scherm zetten
        document.getElementById('count-missend').innerText = mis.length;
        document.getElementById('count-dubbel').innerText = dubbelAantal;
        document.getElementById('count-compleet').innerText = completeClubs;
        
        // De tekstlijstjes invullen
        document.getElementById('lijst-nodig').innerText = mis.length > 0 ? mis.join(', ') : 'Alles compleet! 🎉';
        document.getElementById('lijst-dubbel').innerText = dubbelLijst.length > 0 ? dubbelLijst.join(', ') : 'Nog geen dubbelen';

        nodigHTML += `<strong>${club}:</strong> ${nummers.join(', ')} | `;
    }
    document.getElementById('lijst-nodig').innerHTML = nodigHTML || "Alles compleet! 🎉";

    // Bouw de tekst voor de "Dubbel" lijst
    let dubbelHTML = "";
    for (const [club, nummers] of Object.entries(dubbelPerClub)) {
        dubbelHTML += `<strong>${club}:</strong> ${nummers.join(', ')} | `;
    }
    document.getElementById('lijst-dubbel').innerHTML = dubbelHTML || "Nog geen dubbelen";
}
    
// Verbeterde export-functie
function exporteerData() {
    try {
        // Haal de huidige status op uit localStorage
        const huidigeStatus = localStorage.getItem('voetbalStatus');
        
        if (!huidigeStatus || huidigeStatus === '{}') {
            alert("Er is nog geen data om op te slaan. Vink eerst wat plaatjes aan!");
            return;
        }

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(huidigeStatus);
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "plus_voetbal_stand_2025.json");
        document.body.appendChild(downloadAnchorNode); // Vereist voor sommige browsers
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    } catch (e) {
        alert("Oeps, er ging iets mis bij het exporteren: " + e.message);
    }
}

// Verbeterde import-functie
function importeerData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = readerEvent => {
            try {
                const content = readerEvent.target.result;
                // Check of het wel echte JSON data is
                JSON.parse(content); 
                
                if (confirm("Weet je het zeker? Je huidige vinkjes worden vervangen door de vinkjes uit dit bestand.")) {
                    localStorage.setItem('voetbalStatus', content);
                    location.reload(); 
                }
            } catch (err) {
                alert("Fout: Dit bestand is niet geldig of beschadigd.");
            }
        }
        reader.readAsText(file);
    }
    input.click();
}
    renderApp();
</script>

</body>

</html>
